<text x="24" y="425" font-size="12" fill="#182635" text-anchor="start" font-weight="normal">独立しているもの: URL・設定・Easy Auth・Entra登録・デプロイ。資源は相乗りで安く、認証と権限はアプリごとに分けられる。</text>
<text x="24" y="445" font-size="12" fill="#182635" text-anchor="start" font-weight="normal">密度の目安: B1で数個〜8個。検証アプリ3本+静的1本は余裕。</text>
