<rect x="0" y="0" width="1120" height="560" fill="#ffffff"/>
<text x="24" y="34" font-size="16" fill="#182635" text-anchor="start" font-weight="bold">環境構成の写像 — 検証と本番の並行運用をそのままApp Serviceへ</text>
<text x="24" y="53" font-size="11" fill="#5f6f80" text-anchor="start" font-weight="normal">プランを環境別に分けることで、現行のVM分離と同じ隔離モデルを保つ。</text>
