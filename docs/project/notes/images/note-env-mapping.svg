<text x="24" y="505" font-size="12" fill="#182635" text-anchor="start" font-weight="normal">CI/CD: developブランチ→検証Web App、mainマージ→本番Web App。ランナーは共用(N-4)。</text>
<text x="24" y="527" font-size="12" fill="#182635" text-anchor="start" font-weight="normal">証明書はワイルドカード1枚を両環境で共用(N-3)。費用はプランB1×2で約4,000円/月+PE類(概算)。</text>
