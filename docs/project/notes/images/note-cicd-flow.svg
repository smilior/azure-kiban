<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 540" font-family="Hiragino Kaku Gothic ProN, Hiragino Sans, Yu Gothic, Meiryo, sans-serif">
<defs>
<marker id="am" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0d6fbe"/></marker>
<marker id="aw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a34d0c"/></marker>
<marker id="as" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5f6f80"/></marker>
</defs>
<rect x="0" y="0" width="1160" height="540" fill="#ffffff"/>
<text x="24" y="34" font-size="16" fill="#182635" text-anchor="start" font-weight="bold">閉域でのCI/CD — pushから公開までの流れ</text>
<text x="24" y="53" font-size="11" fill="#5f6f80" text-anchor="start" font-weight="normal">すべての通信が「内→外」か「閉域内」で完結し、インバウンドの開放は存在しない(前提P-8)。</text>
<rect x="40" y="120" width="170" height="60" rx="8" fill="#ffffff" stroke="#9fb0c0" stroke-width="1.4"/>
<text x="125.0" y="144" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">開発者</text>
<text x="125.0" y="162" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">社内NW・git push</text>
<rect x="330" y="80" width="240" height="70" rx="8" fill="#eef1f4" stroke="#9fb0c0" stroke-width="1.4"/>
<text x="450.0" y="104" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">GitHub.com</text>
<text x="450.0" y="122" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">ワークフロー定義(台本)</text>
<text x="450.0" y="137" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">ジョブキュー</text>
<rect x="300" y="200" width="830" height="260" rx="6" fill="none" stroke="#9fb0c0" stroke-width="1.3" stroke-dasharray="7 4"/>
<text x="312" y="222" font-size="12" fill="#5f6f80" text-anchor="start" font-weight="bold">Azure 社内VNet</text>
<text x="312" y="238" font-size="10" fill="#5f6f80" text-anchor="start" font-weight="normal">インバウンド開放なし</text>
<rect x="330" y="260" width="220" height="64" rx="8" fill="#e3f0fa" stroke="#0d6fbe" stroke-width="1.4"/>
<text x="440.0" y="284" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">KEDAスケーラー</text>
<text x="440.0" y="302" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">キューの見張り役(組み込み)</text>
<rect x="620" y="250" width="240" height="90" rx="8" fill="#e3f0fa" stroke="#0d6fbe" stroke-width="1.4"/>
<text x="740.0" y="274" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">ランナー(ACAジョブ)</text>
<text x="740.0" y="292" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">仕事の間だけ存在(0→1→0)</text>
<text x="740.0" y="307" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">⑤ ビルドしてZipを作る</text>
<rect x="920" y="250" width="190" height="90" rx="8" fill="#dff2ef" stroke="#0e7a6e" stroke-width="1.4"/>
<text x="1015.0" y="274" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">App Service</text>
<text x="1015.0" y="292" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">SCM受け口(PE)で受領</text>
<text x="1015.0" y="307" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">⑦ 展開・再起動は自動</text>
<polyline points="210,150 270,150 270,115 324,115" fill="none" stroke="#0d6fbe" stroke-width="2" marker-end="url(#am)"/>
<rect x="234.5" y="91.5" width="67" height="15.5" fill="#ffffff" opacity="0.95"/>
<text x="268" y="100" font-size="10.5" fill="#182635" text-anchor="middle" font-weight="normal">① push</text>
<polyline points="440,260 440,156" fill="none" stroke="#a34d0c" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aw)"/>
<rect x="491.5" y="173.5" width="167" height="15.5" fill="#ffffff" opacity="0.95"/>
<text x="575" y="182" font-size="10.5" fill="#a34d0c" text-anchor="middle" font-weight="normal">② 外向きpoll(数十秒おき)</text>
<polyline points="550,292 614,292" fill="none" stroke="#0d6fbe" stroke-width="2" marker-end="url(#am)"/>
<rect x="538.5" y="269.5" width="87" height="15.5" fill="#ffffff" opacity="0.95"/>
<text x="582" y="278" font-size="10.5" fill="#182635" text-anchor="middle" font-weight="normal">③ 0→1で起動</text>
<polyline points="700,250 700,115 576,115" fill="none" stroke="#a34d0c" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aw)"/>
<rect x="636.5" y="181.5" width="127" height="15.5" fill="#ffffff" opacity="0.95"/>
<text x="700" y="190" font-size="10.5" fill="#a34d0c" text-anchor="middle" font-weight="normal">④ コード取得(外向き)</text>
<polyline points="860,295 914,295" fill="none" stroke="#0d6fbe" stroke-width="2" marker-end="url(#am)"/>
<rect x="863.5" y="272.5" width="47" height="15.5" fill="#ffffff" opacity="0.95"/>
<text x="887" y="281" font-size="10.5" fill="#182635" text-anchor="middle" font-weight="normal">⑥ 搬入</text>
<text x="24" y="500" font-size="12" fill="#182635" text-anchor="start" font-weight="normal">デプロイ権限はランナーのManaged Identity(シークレットの保存なし)。ジョブが終わるとランナーは消え、待機費用は約0円。</text>
<line x1="24" y1="465" x2="60" y2="465" stroke="#a34d0c" stroke-width="1.6" stroke-dasharray="5 3"/>
<text x="66" y="469" font-size="10.5" fill="#5f6f80" text-anchor="start" font-weight="normal">外向き通信(VNet→GitHub)</text>
<line x1="260" y1="465" x2="296" y2="465" stroke="#0d6fbe" stroke-width="2"/>
<text x="302" y="469" font-size="10.5" fill="#5f6f80" text-anchor="start" font-weight="normal">閉域内・社内の通信</text>
</svg>