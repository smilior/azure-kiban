<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 430" font-family="Hiragino Kaku Gothic ProN, Hiragino Sans, Yu Gothic, Meiryo, sans-serif">
<defs>
<marker id="am" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0d6fbe"/></marker>
<marker id="aw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a34d0c"/></marker>
<marker id="at" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0e7a6e"/></marker>
</defs>
<rect x="0" y="0" width="1080" height="430" fill="#ffffff"/>
<text x="24" y="34" font-size="16" fill="#182635" text-anchor="start" font-weight="bold">Graph API連携(メール送信)の2方式</text>
<text x="24" y="53" font-size="11" fill="#5f6f80" text-anchor="start" font-weight="normal">どちらもトークンを自前で保存・更新しない。</text>
<line x1="540" y1="66" x2="540" y2="390" stroke="#9fb0c0" stroke-width="1" stroke-dasharray="6 4"/>
<text x="40" y="88" font-size="13" fill="#182635" text-anchor="start" font-weight="bold">方式A: 利用者本人として送る(委任アクセス許可)</text>
<rect x="60" y="110" width="170" height="52" rx="8" fill="#ffffff" stroke="#9fb0c0" stroke-width="1.4"/>
<text x="145.0" y="140.0" font-size="12.5" fill="#182635" text-anchor="middle" font-weight="normal">アプリ</text>
<rect x="320" y="106" width="190" height="60" rx="8" fill="#e3f0fa" stroke="#0d6fbe" stroke-width="1.4"/>
<text x="415.0" y="134.0" font-size="12.5" fill="#182635" text-anchor="middle" font-weight="normal">Easy Auth</text>
<text x="415.0" y="151.0" font-size="10" fill="#5f6f80" text-anchor="middle" font-weight="normal">トークンストア</text>
<rect x="170" y="270" width="230" height="56" rx="8" fill="#ffffff" stroke="#9fb0c0" stroke-width="1.4"/>
<text x="285.0" y="296.0" font-size="12.5" fill="#182635" text-anchor="middle" font-weight="normal">Graph API</text>
<text x="285.0" y="313.0" font-size="10" fill="#5f6f80" text-anchor="middle" font-weight="normal">Mail.Send(委任)</text>
<polyline points="230,136 314,136" fill="none" stroke="#0d6fbe" stroke-width="1.8" marker-end="url(#am)"/>
<rect x="226.5" y="91" width="91" height="16" fill="#ffffff" opacity="0.95"/>
<text x="272" y="100" font-size="11" fill="#182635" text-anchor="middle" font-weight="normal">① トークン取得</text>
<rect x="182.5" y="180" width="179" height="15" fill="#ffffff" opacity="0.95"/>
<text x="272" y="188" font-size="10" fill="#5f6f80" text-anchor="middle" font-weight="normal">取得はヘッダー / .auth/me</text>
<polyline points="145,162 145,226 285,226 285,264" fill="none" stroke="#0d6fbe" stroke-width="1.8" marker-end="url(#am)"/>
<rect x="143.5" y="209" width="143" height="16" fill="#ffffff" opacity="0.95"/>
<text x="215" y="218" font-size="11" fill="#182635" text-anchor="middle" font-weight="normal">② 利用者のトークンで送信</text>
<text x="40" y="366" font-size="11" fill="#5f6f80" text-anchor="start" font-weight="normal">差出人 = ログイン中の利用者。期限切れは /.auth/refresh でEasy Authが更新する。</text>
<text x="580" y="88" font-size="13" fill="#182635" text-anchor="start" font-weight="bold">方式B: システムとして送る(アプリケーション許可)</text>
<rect x="600" y="110" width="170" height="52" rx="8" fill="#ffffff" stroke="#9fb0c0" stroke-width="1.4"/>
<text x="685.0" y="140.0" font-size="12.5" fill="#182635" text-anchor="middle" font-weight="normal">アプリ</text>
<rect x="860" y="106" width="190" height="60" rx="8" fill="#dff2ef" stroke="#0e7a6e" stroke-width="1.4"/>
<text x="955.0" y="134.0" font-size="12.5" fill="#182635" text-anchor="middle" font-weight="normal">Managed Identity</text>
<text x="955.0" y="151.0" font-size="10" fill="#5f6f80" text-anchor="middle" font-weight="normal">パスワード不要の身分証</text>
<rect x="710" y="270" width="230" height="56" rx="8" fill="#ffffff" stroke="#9fb0c0" stroke-width="1.4"/>
<text x="825.0" y="296.0" font-size="12.5" fill="#182635" text-anchor="middle" font-weight="normal">Graph API</text>
<text x="825.0" y="313.0" font-size="10" fill="#5f6f80" text-anchor="middle" font-weight="normal">Mail.Send(アプリ許可)</text>
<polyline points="770,136 854,136" fill="none" stroke="#0e7a6e" stroke-width="1.8" marker-end="url(#at)"/>
<rect x="740.5" y="91" width="143" height="16" fill="#ffffff" opacity="0.95"/>
<text x="812" y="100" font-size="11" fill="#182635" text-anchor="middle" font-weight="normal">① トークン取得(その場)</text>
<polyline points="685,162 685,226 825,226 825,264" fill="none" stroke="#0e7a6e" stroke-width="1.8" marker-end="url(#at)"/>
<rect x="688.5" y="209" width="133" height="16" fill="#ffffff" opacity="0.95"/>
<text x="755" y="218" font-size="11" fill="#182635" text-anchor="middle" font-weight="normal">② アプリ自身として送信</text>
<text x="580" y="360" font-size="11" fill="#5f6f80" text-anchor="start" font-weight="normal">差出人 = no-reply等の共用メールボックス。</text>
<text x="580" y="378" font-size="11" fill="#5f6f80" text-anchor="start" font-weight="normal">Application Access Policyで送信先メールボックスを限定する(統制必須)。</text>
</svg>