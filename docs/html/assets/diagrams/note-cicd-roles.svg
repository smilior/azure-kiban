<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 330" font-family="Hiragino Kaku Gothic ProN, Hiragino Sans, Yu Gothic, Meiryo, sans-serif">
<defs>
<marker id="am" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0d6fbe"/></marker>
<marker id="aw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a34d0c"/></marker>
<marker id="as" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5f6f80"/></marker>
</defs>
<rect x="0" y="0" width="1120" height="330" fill="#ffffff"/>
<text x="24" y="34" font-size="16" fill="#182635" text-anchor="start" font-weight="bold">役割分担 — 頭脳と体は疎結合</text>
<text x="24" y="53" font-size="11" fill="#5f6f80" text-anchor="start" font-weight="normal">手順を変える=YAMLを直すだけ。作業場を替えても台本は変わらず、GitHubを替えても作業場は流用できる。</text>
<text x="160" y="100" font-size="12" fill="#0d6fbe" text-anchor="middle" font-weight="bold">台本</text>
<rect x="40" y="115" width="240" height="100" rx="8" fill="#eef1f4" stroke="#9fb0c0" stroke-width="1.4"/>
<text x="160.0" y="139" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">GitHub Actions</text>
<text x="160.0" y="157" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">何をするか</text>
<text x="160.0" y="172" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">リポジトリ内のYAML</text>
<text x="440" y="100" font-size="12" fill="#0d6fbe" text-anchor="middle" font-weight="bold">検知</text>
<rect x="320" y="115" width="240" height="100" rx="8" fill="#e3f0fa" stroke="#0d6fbe" stroke-width="1.4"/>
<text x="440.0" y="139" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">GitHub + KEDA</text>
<text x="440.0" y="157" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">いつ動くか</text>
<text x="440.0" y="172" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">キュー+外向きpoll</text>
<text x="720" y="100" font-size="12" fill="#0d6fbe" text-anchor="middle" font-weight="bold">作業場</text>
<rect x="600" y="115" width="240" height="100" rx="8" fill="#e3f0fa" stroke="#0d6fbe" stroke-width="1.4"/>
<text x="720.0" y="139" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">ACAジョブ(ランナー)</text>
<text x="720.0" y="157" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">どこで動くか</text>
<text x="720.0" y="172" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">使い捨て・実行秒課金</text>
<text x="1000" y="100" font-size="12" fill="#0d6fbe" text-anchor="middle" font-weight="bold">劇場</text>
<rect x="880" y="115" width="240" height="100" rx="8" fill="#dff2ef" stroke="#0e7a6e" stroke-width="1.4"/>
<text x="1000.0" y="139" font-size="13" fill="#182635" text-anchor="middle" font-weight="bold">App Service</text>
<text x="1000.0" y="157" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">どこで公開するか</text>
<text x="1000.0" y="172" font-size="10.5" fill="#5f6f80" text-anchor="middle" font-weight="normal">展開・再起動は自動</text>
<polyline points="282,165 316,165" fill="none" stroke="#5f6f80" stroke-width="1.8" marker-end="url(#as)"/>
<polyline points="562,165 596,165" fill="none" stroke="#5f6f80" stroke-width="1.8" marker-end="url(#as)"/>
<polyline points="842,165 876,165" fill="none" stroke="#5f6f80" stroke-width="1.8" marker-end="url(#as)"/>
<text x="24" y="265" font-size="12" fill="#182635" text-anchor="start" font-weight="normal">パイプラインを変更したい → 触るのはYAMLだけ(作業場・劇場は無関係)。</text>
<text x="24" y="287" font-size="12" fill="#182635" text-anchor="start" font-weight="normal">ランナーの置き場を変えたい(例: 常駐VM化) → 台本は1行も変わらない。</text>
</svg>